<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Icon -->
    <g transform="translate(20, 0)">
        <!-- Background hexagon -->
        <path d="M100 20 L170 60 L170 140 L100 180 L30 140 L30 60 Z" 
              fill="url(#cubeGradient)" 
              opacity="0.15"/>
        
        <!-- Top face -->
        <path d="M100 20 L170 60 L100 100 Z" 
              fill="url(#cubeGradient)"/>
        
        <!-- Right face -->
        <path d="M100 100 L170 60 L170 140 L100 180 Z" 
              fill="#FF6B35" 
              opacity="0.75"/>
        
        <!-- Left face -->
        <path d="M100 100 L30 60 L30 140 L100 180 Z" 
              fill="#FF6B35" 
              opacity="0.55"/>
        
        <!-- Center lines -->
        <line x1="100" y1="100" x2="100" y2="180" 
              stroke="#0A0A0A" 
              stroke-width="4" 
              stroke-linecap="round"/>
        <line x1="100" y1="100" x2="170" y2="60" 
              stroke="#0A0A0A" 
              stroke-width="4" 
              stroke-linecap="round"/>
        <line x1="100" y1="100" x2="30" y2="60" 
              stroke="#0A0A0A" 
              stroke-width="4" 
              stroke-linecap="round"/>
    </g>
    
    <!-- Text -->
    <g transform="translate(220, 0)">
        <!-- "Institute of Digital Risk" -->
        <text x="0" y="80" 
              font-family="Inter, Arial, sans-serif" 
              font-size="48" 
              font-weight="800" 
              fill="#0A0A0A"
              letter-spacing="-1">Institute of</text>
        
        <text x="0" y="140" 
              font-family="Inter, Arial, sans-serif" 
              font-size="52" 
              font-weight="800" 
              fill="#FF6B35"
              letter-spacing="-1">Digital Risk</text>
    </g>
</svg>
